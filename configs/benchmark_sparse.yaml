experiment:
  seed: 42
  output_dir: results
  log_level: INFO

fields:
  m_values: [4, 8, 16]
  irreducibles:
    4: 3
    8: 27
    16: 43
  backend: poly

poly:
  k_values: [8, 16, 32]
  dense_moduli: true
  sparse_moduli: true

sparse_study:
  # Number of nonzero coefficients to test as moduli (beyond constant term and leading)
  sparsity_levels: [1, 2, 3, 5, 10]
  n_random_moduli_per_sparsity: 5
  n_trials: 300
  warmup: 30

benchmark:
  n_trials: 300
  warmup: 30
  batch_sizes: [1]
  methods:
    - direct_schoolbook
    - gb_schoolbook
    - gb_karatsuba_k
